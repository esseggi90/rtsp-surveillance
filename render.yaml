services:
  - type: web
    name: rtsp-surveillance
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CAMERAS
        sync: false   # imposta nel dashboard Render
      - key: SECRET_KEY
        generateValue: true
